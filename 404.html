<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Manutenção — Flor de Minas</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --fm-green: #1a3a2a;
            --fm-gold: #c5a059;
            --fm-bg: #fdfcf8;
            --fm-text: #334155;
            --fm-text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--fm-bg);
            color: var(--fm-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Topological Betrayal: Extreme Asymmetry (Left Content / Right Abstract) */
        .maintenance-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 4rem;
            align-items: center;
        }

        .content {
            z-index: 2;
        }

        .brand-container {
            margin-bottom: 3rem;
            opacity: 0;
            transform: translateY(20px);
            animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--fm-green);
            font-size: 1.25rem;
            font-weight: 600;
        }

        .logo img {
            height: 40px;
        }

        .logo span {
            color: var(--fm-gold);
        }

        h1 {
            font-family: 'Merriweather', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            line-height: 1.1;
            color: var(--fm-green);
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(30px);
            animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        p {
            font-size: 1.25rem;
            line-height: 1.6;
            color: var(--fm-text-muted);
            max-width: 500px;
            margin-bottom: 3rem;
            opacity: 0;
            transform: translateY(30px);
            animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(26, 58, 42, 0.05);
            border: 1px solid rgba(26, 58, 42, 0.1);
            border-radius: 99px;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--fm-green);
            margin-bottom: 2rem;
            opacity: 0;
            animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--fm-gold);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .visual-element {
            position: relative;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.9) translateX(50px);
            animation: reveal-visual 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }

        /* Fragmented Abstract Art instead of standard icons */
        .abstract-fragment {
            position: absolute;
            background: linear-gradient(135deg, rgba(26, 58, 42, 0.02) 0%, rgba(197, 160, 89, 0.05) 100%);
            border: 1px solid rgba(26, 58, 42, 0.05);
            border-radius: 4px;
            backdrop-filter: blur(2px);
        }

        .fragment-1 { width: 300px; height: 400px; top: 10%; right: 10%; transform: rotate(5deg); }
        .fragment-2 { width: 250px; height: 250px; bottom: 15%; right: 20%; transform: rotate(-8deg); background: rgba(26, 58, 42, 0.03); border: none; }
        .fragment-3 { width: 150px; height: 150px; top: 40%; right: 40%; border-radius: 50%; border: 1px dashed var(--fm-gold); opacity: 0.3; }

        .massive-type {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 40vh;
            color: rgba(26, 58, 42, 0.02);
            line-height: 1;
            user-select: none;
            pointer-events: none;
        }

        footer {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            font-size: 0.875rem;
            color: var(--fm-text-muted);
            opacity: 0;
            animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
        }

        @keyframes reveal {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes reveal-visual {
            to { opacity: 1; transform: scale(1) translateX(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 1024px) {
            .maintenance-container {
                grid-template-columns: 1fr;
                text-align: center;
                justify-items: center;
            }
            .visual-element {
                display: none;
            }
            p {
                margin-left: auto;
                margin-right: auto;
            }
            .logo {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <main class="content">
            <div class="status-badge">
                <div class="status-dot"></div>
                Atualização em curso
            </div>
            
            <div class="brand-container">
                <a href="#" class="logo">
                    <img src="assets/logo_fundo_branco.png" alt="Flor de Minas Logo">
                    Flor de <span>Minas</span>
                </a>
            </div>

            <h1>Em manutenção.</h1>
            <p>Estamos atualizando nossos serviços para melhor atendê-lo. Em breve voltaremos com novidades e uma experiência ainda mais completa.</p>
            
            <div style="opacity: 0; animation: reveal 0.8s forwards 0.8s;">
                <a href="https://www.instagram.com/flordeminas2026/" target="_blank" style="color: var(--fm-green); text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 0.5rem;">
                    <i class="fab fa-instagram"></i> Acompanhe-nos no Instagram
                </a>
            </div>
        </main>

        <section class="visual-element">
            <div class="massive-type">M</div>
            <div class="abstract-fragment fragment-1"></div>
            <div class="abstract-fragment fragment-2"></div>
            <div class="abstract-fragment fragment-3"></div>
        </section>
    </div>

    <footer>
        © 2026 Associação Flor de Minas — Livres. Fortes. Sagrados.
    </footer>
</body>
</html>
